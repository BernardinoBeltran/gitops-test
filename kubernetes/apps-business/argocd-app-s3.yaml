# Recurso de tipo Application para la app S3
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  # Nombre de la aplicación en el panel de ArgoCD
  name: app-s3
  # Namespace de ArgoCD
  namespace: argocd

spec:
  project: default

  # ORIGEN: Carpeta 'kubernetes/app-s3' en tu repositorio de GitHub
  source:
    repoURL: https://github.com/BernardinoBeltran/gitops-test.git
    targetRevision: HEAD
    path: kubernetes/app-s3

  # DESTINO: Se despliega en el namespace físico 'app-s3'
  destination:
    server: https://kubernetes.default.svc
    namespace: app-s3

  # Sincronización automática activa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
