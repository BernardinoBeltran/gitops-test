apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
  labels:
    k8s-app: fluent-bit
data:
  # Configuración global del servicio Fluent Bit
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [OUTPUT]
        Name                opensearch
        Match               kube.*
        # REEMPLAZA 'ENDPOINT_OPENSEARCH_REEMPLAZAME' por tu opensearch_endpoint real de terraform (sin 'https://')
        Host                vpc-eks-logs-domain-dpofxt4cixg4ns5xv2w55xh3ha.eu-north-1.es.amazonaws.com
        Port                443
        TLS                 On
        AWS_Auth            On
        AWS_Region          eu-north-1
        Index               kubernetes-logs
        Type                _doc
        Suppress_Type_Name  On
        Replace_Dots        On
        Logstash_Format     On
        Logstash_Prefix     k8s-logs

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On
