apiVersion: v1
kind: ConfigMap
metadata:
  name: app-red-webpage
  namespace: app-red
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>App Roja</title>
      <style>
        body { 
          background-color: #ffcccc; 
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
          text-align: center; 
          padding-top: 100px;
          margin: 0;
        }
        .container {
          background: white;
          display: inline-block;
          padding: 40px;
          border-radius: 12px;
          box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { 
          color: #cc0000; 
          font-size: 36px; 
          margin-bottom: 10px;
        }
        p {
          color: #555;
          font-size: 18px;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>¡Hola desde la Aplicación ROJA! 🔴</h1>
        <p>Esta es una app independiente desplegada con ArgoCD y ruteada a través de Kong.</p>
      </div>
    </body>
    </html>
