apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-proxy-config
  namespace: logging
data:
  default.conf: |
    server {
        listen 80;
        
        # Desactivamos el buffer para que cargue la interfaz en tiempo real
        proxy_buffering off;

        location / {
            # REEMPLAZA 'ENDPOINT_OPENSEARCH_REEMPLAZAME' por tu opensearch_endpoint real de terraform (sin 'https://')
            proxy_pass https://vpc-eks-logs-domain-dpofxt4cixg4ns5xv2w55xh3ha.eu-north-1.es.amazonaws.com;
            
            # Encabezados necesarios para pasar a través del balanceador y TLS de AWS
            proxy_set_header Host vpc-eks-logs-domain-dpofxt4cixg4ns5xv2w55xh3ha.eu-north-1.es.amazonaws.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # ACTIVAR SNI (Server Name Indication) es obligatorio en AWS OpenSearch
            proxy_ssl_server_name on;
            proxy_ssl_session_reuse off;
            
            # Ajustes de cabecera para websockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-proxy
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-proxy
  template:
    metadata:
      labels:
        app: opensearch-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: config
        configMap:
          name: opensearch-proxy-config

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-proxy
  namespace: logging
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: opensearch-proxy
